spring.application.name=strata
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.hikari.maximum-pool-size=5
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false
mybatis-plus.configuration.map-underscore-to-camel-case=true
app.auth.access-token-secret=change-me-change-me-change-me-change-me
app.auth.access-token-issuer=strata
app.auth.access-token-ttl=PT15M
app.auth.refresh-token-ttl=PT20M
app.auth.refresh-cookie-name=strata_refresh_token
app.auth.refresh-cookie-path=/
app.auth.refresh-cookie-http-only=true
app.auth.refresh-cookie-secure=false
app.auth.refresh-cookie-same-site=Lax
app.auth.login-rate-limit.max-tracked-keys=10000
app.auth.login-rate-limit.per-ip.limit-for-period=30
app.auth.login-rate-limit.per-ip.refresh-period=PT1M
app.auth.login-rate-limit.per-email.limit-for-period=10
app.auth.login-rate-limit.per-email.refresh-period=PT15M
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
